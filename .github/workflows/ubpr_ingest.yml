name: UBPR Data Ingestion

on:
  # Run automatically when a new quarter likely becomes available
  # FFIEC releases quarterly data ~2 weeks after quarter end
  # Q1 (Mar 31) → mid-April | Q2 (Jun 30) → mid-July
  # Q3 (Sep 30) → mid-October | Q4 (Dec 31) → mid-January
  schedule:
    - cron: "0 8 15 1,4,7,10 *"   # 8 AM UTC on the 15th of Jan/Apr/Jul/Oct

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental   # only new quarters missing from R2
          - full          # backfill all missing quarters
          - dry-run       # preview without downloading
      quarter:
        description: "Specific quarter to ingest (YYYYMMDD) — leave blank for auto"
        required: false
        default: ""
      budget_gb:
        description: "Budget cap in GB"
        required: false
        default: "50"

jobs:
  ingest:
    name: Ingest FFIEC UBPR Data
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3 hours max — full backfill of 93 quarters takes ~2 hours

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bigdata/requirements.txt

      # ── 3. Java for PySpark ────────────────────────────────────────────────
      - name: Set up Java 11 (required for PySpark)
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bigdata/requirements.txt
          pip install -e bigdata/

      # ── 5. Write .env for ingestion ────────────────────────────────────────
      - name: Configure environment
        run: |
          cat > bigdata/bigdata/.env << EOF
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          FFIEC_USER_ID=${{ secrets.FFIEC_USER_ID }}
          FFIEC_PWS_TOKEN=${{ secrets.FFIEC_PWS_TOKEN }}
          INGEST_BUDGET_GB=${{ github.event.inputs.budget_gb || '50' }}
          EOF

      # ── 6. Test R2 connectivity ────────────────────────────────────────────
      - name: Test R2 connectivity
        run: |
          python - << 'EOF'
          import sys, os
          sys.path.insert(0, 'bigdata')
          from bigdata.queryengine.query_engine import ping_r2
          result = ping_r2()
          print(f"R2 status: {result}")
          if result['status'] != 'ok':
              print(f"R2 connectivity failed: {result.get('detail')}")
              sys.exit(1)
          print(f"R2 reachable — {result['quarters_available']} quarters currently stored")
          EOF

      # ── 7. Dry run — show what will be ingested ────────────────────────────
      - name: Preview ingestion plan
        run: |
          cd bigdata
          ARGS="--dry-run"
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then ARGS="$ARGS --full"; fi
          if [ -n "${{ github.event.inputs.quarter }}" ]; then ARGS="$ARGS --quarter ${{ github.event.inputs.quarter }}"; fi
          python bigdata/ingestion/ubpr_ingest.py $ARGS

      # ── 8. Run ingestion ───────────────────────────────────────────────────
      - name: Run ingestion
        if: ${{ github.event.inputs.mode != 'dry-run' }}
        run: |
          cd bigdata
          ARGS=""
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          if [ "$MODE" = "full" ]; then ARGS="--full"; fi
          if [ -n "${{ github.event.inputs.quarter }}" ]; then ARGS="$ARGS --quarter ${{ github.event.inputs.quarter }}"; fi
          BUDGET="${{ github.event.inputs.budget_gb || '50' }}"
          python bigdata/ingestion/ubpr_ingest.py $ARGS --budget-gb $BUDGET

      # ── 9. Verify results ──────────────────────────────────────────────────
      - name: Verify R2 after ingestion
        if: ${{ github.event.inputs.mode != 'dry-run' }}
        run: |
          python - << 'EOF'
          import sys
          sys.path.insert(0, 'bigdata')
          from bigdata.queryengine.query_engine import list_available_quarters, ping_r2
          result = ping_r2()
          quarters = list_available_quarters()
          print(f"R2 now has {len(quarters)} quarters")
          print(f"   Oldest: {quarters[0] if quarters else 'none'}")
          print(f"   Latest: {quarters[-1] if quarters else 'none'}")
          EOF

      # ── 10. Trigger Render backend cache clear ─────────────────────────────
      - name: Clear backend cache
        if: ${{ github.event.inputs.mode != 'dry-run' }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_BACKEND_URL }}/ubpr/cache/clear" \
            -X POST \
            -H "X-Internal-Token: ${{ secrets.INTERNAL_API_TOKEN }}" \
          | grep -q "200" && echo "Cache cleared" || echo "⚠️ Cache clear failed (non-fatal)"
        continue-on-error: true