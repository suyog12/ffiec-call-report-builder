name: UBPR Data Ingestion

on:
  schedule:
    - cron: "0 8 15 1,4,7,10 *"

  # Push trigger — runs incremental + backfill automatically on these branches
  push:
    branches:
      - main
      - temp-bigdata-changes
    paths:
      - "bigdata/ingestion/ubpr_ingest.py"
      - ".github/workflows/ubpr_ingest.yml"

  workflow_dispatch:
    inputs:
      mode:
        description: "Ingestion mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
          - backfill-only
          - dry-run
      quarter:
        description: "Specific quarter (YYYYMMDD) — leave blank for auto"
        required: false
        default: ""
      budget_gb:
        description: "Budget cap in GB"
        required: false
        default: "50"

jobs:
  ingest:
    name: Ingest FFIEC UBPR Data
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bigdata/requirements.txt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bigdata/requirements.txt
          pip install pyspark==3.5.0 duckdb boto3 pyarrow pandas python-dotenv ffiec-data-collector

      - name: Configure environment
        run: |
          mkdir -p bigdata
          cat > bigdata/.env << EOF
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          FFIEC_USER_ID=${{ secrets.FFIEC_USER_ID }}
          FFIEC_PWS_TOKEN=${{ secrets.FFIEC_PWS_TOKEN }}
          INGEST_BUDGET_GB=${{ github.event.inputs.budget_gb || '50' }}
          EOF

      - name: Test R2 connectivity
        run: |
          cd bigdata
          python - << 'PYEOF'
          import os
          from dotenv import load_dotenv
          load_dotenv('.env')
          import boto3
          s3 = boto3.client(
              's3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              region_name='auto',
          )
          r = s3.list_objects_v2(Bucket=os.environ['R2_BUCKET'], Prefix='ubpr/year=', MaxKeys=5)
          print(f"R2 reachable — {r.get('KeyCount', 0)} sample objects found")
          PYEOF

      - name: Preview ingestion plan
        run: |
          cd bigdata
          ARGS="--dry-run"
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          if [ "$MODE" = "full" ]; then ARGS="$ARGS --full"; fi
          if [ -n "${{ github.event.inputs.quarter }}" ]; then
            ARGS="$ARGS --quarter ${{ github.event.inputs.quarter }}"
          fi
          python ingestion/ubpr_ingest.py $ARGS

      # Step A — Download new quarters from FFIEC (skipped for backfill-only and dry-run)
      - name: Download new quarters from FFIEC
        if: |
          github.event.inputs.mode != 'dry-run' &&
          github.event.inputs.mode != 'backfill-only'
        run: |
          cd bigdata
          ARGS=""
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          if [ "$MODE" = "full" ]; then ARGS="--full"; fi
          if [ -n "${{ github.event.inputs.quarter }}" ]; then
            ARGS="$ARGS --quarter ${{ github.event.inputs.quarter }}"
          fi
          python ingestion/ubpr_ingest.py $ARGS --budget-gb ${{ github.event.inputs.budget_gb || '50' }}

      # Step B — Backfill per-bank files for all quarters that are missing them
      # Reads existing R2 full-quarter files and splits into per-bank files
      # No FFIEC download — uses data already in R2
      # Enables sub-100ms queries instead of scanning 30MB files
      - name: Backfill per-bank files
        if: github.event.inputs.mode != 'dry-run'
        timeout-minutes: 300
        run: |
          cd bigdata
          python - << 'PYEOF'
          import sys, os, io, logging
          import boto3
          import pandas as pd
          import pyarrow as pa
          import pyarrow.parquet as pq
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from botocore.config import Config
          from dotenv import load_dotenv

          load_dotenv('.env')

          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')
          logger = logging.getLogger('backfill')

          S3_ENDPOINT    = os.environ['R2_ENDPOINT'].rstrip('/')
          AWS_ACCESS_KEY = os.environ['R2_ACCESS_KEY_ID']
          AWS_SECRET_KEY = os.environ['R2_SECRET_ACCESS_KEY']
          BUCKET         = os.environ['R2_BUCKET']

          def get_s3():
              return boto3.client(
                  's3',
                  endpoint_url=S3_ENDPOINT,
                  aws_access_key_id=AWS_ACCESS_KEY,
                  aws_secret_access_key=AWS_SECRET_KEY,
                  region_name='auto',
                  config=Config(max_pool_connections=20,
                                retries={'max_attempts': 3, 'mode': 'adaptive'}),
              )

          def list_r2_quarters(s3):
              stored = {}
              paginator = s3.get_paginator('list_objects_v2')
              for page in paginator.paginate(Bucket=BUCKET, Prefix='ubpr/year='):
                  for obj in page.get('Contents', []):
                      key = obj['Key']
                      if not key.endswith('/data.parquet'):
                          continue
                      parts = key.split('/')
                      if len(parts) != 4:
                          continue
                      quarter = parts[2].replace('quarter=', '')
                      if len(quarter) == 8 and quarter.isdigit():
                          stored[quarter] = obj['Size']
              return stored

          def has_per_bank_files(s3, quarter_date):
              """Fast check: download first 1KB of parquet, extract an RSSD ID, HEAD check."""
              try:
                  # List just 1 object under by_bank that ends with this quarter
                  # Use list_objects with a broad prefix and filter
                  result = s3.list_objects_v2(
                      Bucket=BUCKET,
                      Prefix=f"ubpr/by_bank/",
                      MaxKeys=1000,
                  )
                  for obj in result.get("Contents", []):
                      if obj["Key"].endswith(f"/{quarter_date}.parquet"):
                          return True
                  return False
              except Exception as e:
                  logger.warning(f"has_per_bank_files check failed for {quarter_date}: {e}")
                  return False

          def backfill_quarter(s3, quarter_date):
              import time as _time
              t0 = _time.time()
              year = quarter_date[:4]
              s3_key = f"ubpr/year={year}/quarter={quarter_date}/data.parquet"

              # Download via boto3 get_object (fast — single streaming download)
              logger.info(f"  Downloading {quarter_date}...")
              obj   = s3.get_object(Bucket=BUCKET, Key=s3_key)
              data  = obj["Body"].read()
              logger.info(f"  Downloaded {len(data)/1024/1024:.1f} MB in {_time.time()-t0:.1f}s")

              # Parse with pyarrow (local, no network)
              table = pa.read_table(io.BytesIO(data))
              df    = table.to_pandas()
              logger.info(f"  Parsed {len(df):,} banks, {len(df.columns)} columns")

              if df.empty:
                  return 0

              # Upload per-bank files with controlled concurrency
              groups = list(df.groupby('rssd_id'))
              total_bytes = 0
              errors = 0

              # Pre-serialize ALL bank files to bytes first (CPU-bound, sequential)
              # Then upload in parallel (IO-bound)
              serialized = {}
              for rssd_id, bank_df in groups:
                  buf = io.BytesIO()
                  pq.write_table(
                      pa.Table.from_pandas(bank_df.reset_index(drop=True)),
                      buf, compression='snappy'
                  )
                  serialized[str(rssd_id)] = buf.getvalue()

              # Upload in parallel — pure IO, no CPU contention
              def upload_one(rssd_id, data):
                  key = f"ubpr/by_bank/{rssd_id}/{quarter_date}.parquet"
                  s3.put_object(Bucket=BUCKET, Key=key, Body=data)
                  return len(data)

              with ThreadPoolExecutor(max_workers=8) as pool:
                  futures = {pool.submit(upload_one, r, d): r for r, d in serialized.items()}
                  for future in as_completed(futures):
                      try:
                          total_bytes += future.result()
                      except Exception as e:
                          errors += 1
                          logger.debug(f"Upload failed for {futures[future]}: {e}")

              logger.info(
                  f"  {quarter_date}: {len(groups)-errors}/{len(groups)} banks, "
                  f"{total_bytes/1024:.0f} KB"
              )
              return total_bytes

          # Main
          s3 = get_s3()
          r2_quarters = list_r2_quarters(s3)
          logger.info(f"Found {len(r2_quarters)} full-quarter files in R2")

          need_backfill = []
          for q in sorted(r2_quarters.keys(), reverse=True):
              if not has_per_bank_files(s3, q):
                  need_backfill.append(q)

          logger.info(f"Quarters needing per-bank backfill: {len(need_backfill)}")

          if not need_backfill:
              logger.info("All quarters already have per-bank files")
              sys.exit(0)

          succeeded, failed, total_bytes = [], [], 0
          for i, q in enumerate(need_backfill, 1):
              logger.info(f"[{i}/{len(need_backfill)}] Backfilling {q}...")
              try:
                  b = backfill_quarter(s3, q)
                  total_bytes += b
                  succeeded.append(q)
              except Exception as e:
                  logger.error(f"  {q} failed: {e}")
                  failed.append(q)

          logger.info(
              f"Backfill complete: {len(succeeded)} succeeded, "
              f"{len(failed)} failed, {total_bytes/1024/1024:.1f} MB written"
          )
          PYEOF

      - name: Verify R2 state
        if: github.event.inputs.mode != 'dry-run'
        run: |
          cd bigdata
          python - << 'PYEOF'
          import os
          from dotenv import load_dotenv
          load_dotenv('.env')
          import boto3

          s3 = boto3.client(
              's3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              region_name='auto',
          )
          paginator = s3.get_paginator('list_objects_v2')
          full_quarters = per_bank_files = total_bytes = 0

          for page in paginator.paginate(Bucket=os.environ['R2_BUCKET'], Prefix='ubpr/'):
              for obj in page.get('Contents', []):
                  key = obj['Key']
                  total_bytes += obj['Size']
                  if '/quarter=' in key and key.endswith('/data.parquet'):
                      full_quarters += 1
                  elif '/by_bank/' in key:
                      per_bank_files += 1

          print(f"R2 state:")
          print(f"  Full-quarter files : {full_quarters}")
          print(f"  Per-bank files     : {per_bank_files:,}")
          print(f"  Total size         : {total_bytes/1024/1024/1024:.2f} GB")
          print(f"  Avg banks/quarter  : {per_bank_files//full_quarters if full_quarters else 0}")
          PYEOF

      - name: Clear backend cache
        if: github.event.inputs.mode != 'dry-run'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_BACKEND_URL }}/ubpr/cache/clear" \
            -X POST \
            -H "X-Internal-Token: ${{ secrets.INTERNAL_API_TOKEN }}" \
          | grep -q "200" && echo "Backend cache cleared" || echo "Cache clear failed (non-fatal)"
        continue-on-error: true